name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      # Hermetic by default — no SONAR_GRAPHQL_ENDPOINT, so the live smoke is skipped.
      - run: npm run typecheck
      - run: npm test
