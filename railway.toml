# Railway deploy config — inventory-api (Bun/Hyper HTTP+MCP service).
# Consumed over the wire by honeyroad + agents; reads the sonar belt over GraphQL.
[build]
builder = "nixpacks"

[deploy]
startCommand = "bun src/app.ts"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
