# Codex Release Names — Mibera cultural identifiers for scoring versions
metadata:
  description: "Maps scoring versions to Codex names from the Mibera cultural universe"
  pool_source: "mibera-codex knowledge base"

assigned:
  - id: codex-v0.1.0-bear-cave-wall
    term: "Bear Cave Wall"
    version: "v0.1.0"
    subtitle: "Foundation"
    short: "First shadows on stone — the primitive scoring system takes form"
    context: |
      V0.1.0 encompasses all pre-semver formula iterations (V2–V8.1)
      and dashboard versions (v1.0–v2.4). From basic log2 transforms
      through sybil detection, smart transforms, diamond hands,
      multiplicative conviction, market timing, and badges. The entire
      scoring system projected onto the wall for the first time.
    source: "score-api V2–V8.1 changelog, Codex philosophy.md"
    tags: [release, foundation, origin]

  - id: codex-v0.2.0-the-awakening
    term: "The Awakening"
    version: "v0.2.0"
    subtitle: "Lifecycle Tracking"
    short: "The system opens its eyes — burns, staking, and Diamond Hands recognized"
    context: |
      Pipeline was dormant since launch, then awoke with the 6-hour
      cron. Burns became conviction signals (ego death = recognition).
      Transfer classification = the system learning nuance. Staking
      no longer penalized. Diamond Hands restored.
    source: "score-api v0.2.0 changelog"
    tags: [release, lifecycle, awakening]

  - id: codex-v0.3.0-freetekno
    term: "Freetekno"
    version: "v0.3.0"
    subtitle: "Multi-Wallet & Hardening"
    short: "Nomadic sound system — multiple wallets unified, security hardened"
    context: |
      Freetekno: the underground rave movement where sound systems are
      free and open. V0.3.0 unified multi-wallet scoring (your wallets
      combine freely), hardened security (12 audit findings), and
      optimized the pipeline. Free as in freedom to bring all your
      wallets to the party.
    source: "score-api v0.3.0 changelog, Codex archetypes.md"
    tags: [release, multi-wallet, security, rave]

